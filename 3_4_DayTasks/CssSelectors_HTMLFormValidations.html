<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internship Task: Forms, Validation & CSS Specificity</title>
    <link rel="stylesheet" href="3_4_style.css">
</head>
<body>

    <form action="#" method="POST" id="internship-demo-form">
        <h2>Registration Form</h2>

        <div class="form-group">
            <label for="username">Username (Text)</label>
            <input 
                type="text" 
                id="username" 
                class="input-field" 
                required 
                minlength="4" 
                maxlength="15" 
                placeholder="e.g., rabab_zahra"
            >
            <span class="helper-text">Required: Between 4 and 15 characters.</span>
        </div>

        <div class="form-group">
            <label for="user-email">Email Address (Email)</label>
            <input 
                type="email" 
                id="user-email" 
                class="input-field" 
                required 
                placeholder="name@example.com"
            >
            <span class="helper-text">Must be a valid email format containing @ and domain.</span>
        </div>

        <div class="form-group">
            <label for="user-password">Password (Password)</label>
            <input 
                type="password" 
                id="user-password" 
                class="input-field" 
                required 
                pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                placeholder="••••••••"
            >
            <span class="helper-text">Minimum 8 characters, at least 1 uppercase, 1 lowercase, and 1 number.</span>
        </div>

        <div class="form-group">
            <label for="user-age">Age (Number)</label>
            <input 
                type="number" 
                id="user-age" 
                class="input-field" 
                required 
                min="18" 
                max="99" 
                placeholder="18"
            >
            <span class="helper-text">Must be a number between 18 and 99.</span>
        </div>

        <div class="form-group">
            <label for="user-phone">Phone Number (Tel)</label>
            <input 
                type="tel" 
                id="user-phone" 
                class="input-field" 
                required 
                pattern="[0-9]{11}" 
                placeholder="03001234567"
            >
            <span class="helper-text">Must be exactly 11 digits.</span>
        </div>

        <button type="submit" id="submit-btn" class="btn-action">Submit Details</button>
    </form>

</body>
</html>
